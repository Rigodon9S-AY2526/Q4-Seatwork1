<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seatwork 1</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <br>
    <div class="container d-flex justify-content-center align-items-center flex-column">
        <h3>Account Login</h3>

        <details ontoggle="alert('TEST CREDENTIALS: \nUser: Room 403 \nPass: abcde123')">
            <summary class="btn2 btn-sm btn-outline-secondary mb-3">View Login Help</summary>
            <p class="small text-muted">Enter the credentials shown in the alert box.</p>
        </details>

        <form>
            <label for="uname">Username</label>
            <input type="text" name="uname" class="form-control" id="UserName">

            <label for="pass">Password</label>
            <input type="password" name="pass" class="form-control" id="Password">
        </form>

        <br>

        <div class="form-check text-start mb-2">
            <input class="form-check-input" type="checkbox">
            <label class="form-check-label">Stay logged in</label>
        </div>

        <div class="d-flex">
            <button class="btn btn-login" onclick="login()">Login</button>
            <button class="btn btn-cancel" onclick="window.location.reload()">Cancel</button>
        </div>

        <br>
    </div>


    <script src="script.js"></script>
</body>

</html>
